services:
  postgres:
    image: postgres:16-alpine
    container_name: orion-shop-postgres
    environment:
      POSTGRES_DB: orion_shop
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
